<!DOCTYPE html>  <html>  
<head>  
    <title>Report Lost Item - Smart Lost and Found Portal</title>  
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">  
</head>  <body>  <div class="container">  <h1>Report Lost Item</h1>  <p>Fill in the details below to report your lost item.</p>  <hr>  <form method="POST">  <label>Item Name</label>
<input type="text" name="item_name" placeholder="Enter item name" required>

<label>Category</label>
<select name="category" required>

<option value="">Select Category</option>  
<option>Mobile Phone</option>  
<option>Laptop</option>  
<option>Wallet</option>  
<option>ID Card</option>  
<option>Bag</option>  
<option>Watch</option>  
<option>Book</option>  
<option>Keys</option>  
<option>Earphones</option>  
<option>Water Bottle</option>  
<option>Other</option>  
</select>  <label>Location Lost</label>
<input type="text" name="location" placeholder="Where did you lose it?" required>

<label>Date Lost</label>
<input type="date" name="date" required>

<label>Description</label>

<textarea name="description" rows="5" placeholder="Describe your item with color, brand, size or any identification marks." required></textarea>  <input type="submit" value="Submit Lost Item">  </form>  <br>  <a href="/">Back to Home</a>

</div>  </body>  
</html>
